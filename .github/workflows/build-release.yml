name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: make app

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION//\//-}"
          bash scripts/package-release.sh macos "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bank-account-macos
          path: dist/*.zip

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make

      - name: Fetch WebView2 SDK
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/fetch-webview2.ps1

      - name: Build
        run: make app RELEASE=1

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '/', '-'
          ./scripts/package-release.ps1 windows $version

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bank-account-windows
          path: dist/*.zip

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v6
        with:
          name: bank-account-macos
          path: dist

      - name: Download Windows build
        uses: actions/download-artifact@v6
        with:
          name: bank-account-windows
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
